<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Futbol MVC - 7Bits</title>
</head>
<body>
    <section id="mainView">
        <h2>Gestión del Equipo de Fútbol</h2>
        <button id="btnAgregar">Reportar Nuevo Juego</button>
        <br><br>
        <div id="salida">
            Porcentaje de juegos ganados: <span id="lblPorcentaje">0.00</span>%<br>
            Total de registros procesados: <span id="lblTotalJuegos">0</span>
        </div>
    </section>

    <section id="secView" style="display: none;">
        <h2>Procesar Juego</h2>
        <div>
            <label>Resultado (1=Ganado, 0=Perdido):</label>
            <input type="number" id="inResultado">
        </div>
        <br>
        <button id="btnAceptar">Aceptar</button>
        <button id="btnCancelar">Cancelar</button>
    </section>

    <script type="module">
        import Cl_cEquipo from "./dist/controllers/Cl_cEquipo.js";
        new Cl_cEquipo();
    </script>
</body>
</html>
